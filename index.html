<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rucoy Nexus</title>
    <style>
        /* ... seu CSS do drawer e topbar ... */
        body.is-app header, body.is-app #drawer, body.is-app #overlay { display: none !important; }
        body.is-app main { padding: 0 !important; }
    </style>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const isApp = params.get('platform') === 'app';

        // 1. CAPTURA O TOKEN DO GOOGLE (Se acabou de logar)
        if (window.location.hash.includes("credential=")) {
            const token = new URLSearchParams(window.location.hash.replace("#", "?")).get("credential");
            if (token) {
                localStorage.setItem("userToken", token);
                // Limpa a URL para ficar bonita
                window.location.href = window.location.origin + window.location.pathname + (isApp ? "?platform=app" : "");
            }
        }

        // 2. VERIFICA LOGIN
        const userToken = localStorage.getItem("userToken");
        if (!userToken) {
            window.location.href = "/account/" + (isApp ? "?platform=app" : "");
        }

        // 3. APLICA MODO APP
        if (isApp) {
            document.documentElement.classList.add('is-app'); // Usamos no HTML para ser mais rápido
        }
    </script>

    <div id="overlay" onclick="toggleMenu()"></div>
    <header>
        <div class="top-bar-action" onclick="toggleMenu()">
            <div class="menu-btn"><img src="/res/icon/navnav.png"></div>
            <span id="current-page-title">Home</span>
        </div>
    </header>

    <nav id="drawer">
        <div class="drawer-banner"></div>
        <div class="drawer-list">
            <script>
                const suffix = isApp ? "?platform=app" : "";
                document.write(`
                    <a href="/${suffix}" class="drawer-item"><img src="/res/icon/home.png"> Home</a>
                    <a href="/profile/${suffix}" class="drawer-item"><img src="/res/icon/user.png"> Profile</a>
                    <a href="/wiki/${suffix}" class="drawer-item"><img src="/res/icon/apps.png"> Wiki</a>
                    <a href="/tradeandsales/${suffix}" class="drawer-item"><img src="/res/icon/change.png"> Trades & Sales</a>
                    <a href="/map/${suffix}" class="drawer-item"><img src="/res/icon/map.png"> Map</a>
                    <a href="/settings/${suffix}" class="drawer-item settings-highlight"><img src="/res/icon/ic_cog.png"> Settings</a>
                `);
            </script>
        </div>
    </nav>

    <main id="main-content">
        <h1>Dashboard</h1>
        <p>Bem-vindo ao Rucoy Nexus!</p>
    </main>

    <script>
        function toggleMenu() {
            const d = document.getElementById('drawer');
            const o = document.getElementById('overlay');
            d.classList.toggle('active');
            o.style.display = d.classList.contains('active') ? 'block' : 'none';
        }
        if (isApp) document.body.classList.add('is-app');
    </script>
</body>
</html>
