<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rucoy Nexus</title>
    <style>
        :root { --rucoy-blue: #3CBCFC; --rucoy-bg: #121212; --rucoy-drawer-bg: #2173b3; --white: #F3F3F3; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--rucoy-bg); color: var(--white); }

        /* HEADER */
        header { background-color: var(--rucoy-blue); height: 56px; display: flex; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 100; }
        .menu-btn img { width: 24px; filter: brightness(0) invert(1); cursor: pointer; }
        #current-page-title { font-size: 20px; margin-left: 20px; font-weight: 500; }

        /* DRAWER */
        #drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: var(--rucoy-drawer-bg); z-index: 200; transition: 0.3s; box-shadow: 4px 0 10px rgba(0,0,0,0.5); }
        #drawer.active { left: 0; }
        .drawer-banner { width: 100%; height: 150px; background: url('/res/icon/draweBanner.png') no-repeat center/cover; }
        .drawer-list { padding: 8px 0; }
        .drawer-item { padding: 12px 16px; display: flex; align-items: center; color: white; text-decoration: none; }
        .drawer-item img { width: 24px; margin-right: 32px; filter: brightness(0) invert(1); }

        /* MODO APP: ESCONDE TUDO E AJUSTA O TOPO */
        body.is-app header, body.is-app #drawer, body.is-app #overlay { display: none !important; }
        body.is-app main { padding-top: 0 !important; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        main { padding: 76px 20px 20px; }
    </style>
</head>
<body>
    <script>
        // Verifica se é APP pelo parâmetro ou pelo que salvamos no login
        const isApp = new URLSearchParams(window.location.search).get('platform') === 'app' || localStorage.getItem("isAppMode") === "true";
        
        if (isApp) {
            document.body.classList.add('is-app');
            localStorage.setItem("isAppMode", "true"); // Garante que continue como app
        }

        // Captura token do Google
        if (window.location.hash.includes("credential=")) {
            const token = new URLSearchParams(window.location.hash.replace("#", "?")).get("credential");
            if (token) localStorage.setItem("userToken", token);
            window.location.hash = ""; // Limpa a URL
        }

        if (!localStorage.getItem("userToken")) {
            window.location.href = "/account/" + (isApp ? "?platform=app" : "");
        }
    </script>

    <div id="overlay" onclick="toggleMenu()"></div>
    <header>
        <div class="menu-btn" onclick="toggleMenu()"><img src="/res/icon/navnav.png"></div>
        <span id="current-page-title">Home</span>
    </header>

    <nav id="drawer">
        <div class="drawer-banner"></div>
        <div class="drawer-list" id="menu-links">
            </div>
    </nav>

    <main>
        <h1>Dashboard</h1>
        <p>Bem-vindo ao Rucoy Nexus oficial!</p>
    </main>

    <script>
        function toggleMenu() {
            const d = document.getElementById('drawer');
            const o = document.getElementById('overlay');
            d.classList.toggle('active');
            o.style.display = d.classList.contains('active') ? 'block' : 'none';
        }

        // Gerar menu em Português
        const menuItems = [
            { t: "Home", i: "home.png", h: "/" },
            { t: "Perfil", i: "user.png", h: "/profile/" },
            { t: "Wiki", i: "apps.png", h: "/wiki/" },
            { t: "Trocas e vendas", i: "change.png", h: "/tradeandsales/" },
            { t: "Mapa", i: "map.png", h: "/map/" },
            { t: "Configurações", i: "ic_cog.png", h: "/settings/" }
        ];

        const list = document.getElementById('menu-links');
        const suffix = isApp ? "?platform=app" : "";
        
        menuItems.forEach(item => {
            const a = document.createElement('a');
            a.href = item.h + suffix;
            a.className = "drawer-item";
            a.innerHTML = `<img src="/res/icon/${item.i}"> ${item.t}`;
            list.appendChild(a);
        });
    </script>
</body>
</html>
