<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="/icon.jpeg">
<title>Nexus Map</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

<style>
body { margin: 0; background: #000; overflow: hidden; }
canvas { display: block; image-rendering: pixelated; }

.zoom-controls {
    position: absolute; bottom: 25px; right: 20px;
    display: flex; flex-direction: column; gap: 12px;
}
.btn-zoom {
    width: 55px; height: 55px;
    background: rgba(0,0,0,0.8);
    border: 2px solid #fff;
    color: white; font-size: 30px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
}
</style>
</head>

<body>

<div class="zoom-controls">
    <div class="btn-zoom" onclick="changeZoom(0.3)">+</div>
    <div class="btn-zoom" onclick="changeZoom(-0.3)">-</div>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    pixelArt: true,
    backgroundColor: '#111',
    scale: {
        mode: Phaser.Scale.RESIZE,
        width: '100%',
        height: '100%'
    },
    scene: { preload, create }
};

const game = new Phaser.Game(config);
let cam;

function preload() {
    const v = Date.now();

    // 🔥 AJUSTA AQUI SE PRECISAR
    this.load.tilemapTiledJSON('mapa', 'res/maps/mapa.json?v=' + v);
    this.load.image('tiles', 'res/maps/map.png?v=' + v);
}

function create() {
    const mapData = this.cache.tilemap.get('mapa').data;

    const map = this.make.tilemap({
        tileWidth: mapData.tilewidth,
        tileHeight: mapData.tileheight
    });

    // 🔥 NOME EXATO DO TILESET DO TILED
    const tileset = map.addTilesetImage('tiles do mapa', 'tiles', 24, 24, 1, 2);

    cam = this.cameras.main;
    cam.setZoom(1.5);

    mapData.layers.forEach(layer => {
        if (!layer.chunks) return;

        layer.chunks.forEach(chunk => {

            const layerTiles = map.createBlankLayer(
                "chunk_" + chunk.x + "_" + chunk.y,
                tileset,
                chunk.x * map.tileWidth,
                chunk.y * map.tileHeight,
                chunk.width,
                chunk.height
            );

            for (let y = 0; y < chunk.height; y++) {
                for (let x = 0; x < chunk.width; x++) {

                    let tile = chunk.data[x + y * chunk.width];

                    if (tile !== 0) {
                        // 🔥 REMOVE FLIP DO TILED
                        const realTile = tile & 0x1FFFFFFF;

                        layerTiles.putTileAt(realTile - 1, x, y);
                    }
                }
            }
        });
    });

    cam.centerOn(0, 0);

    this.input.on('pointermove', (p) => {
        if (p.isDown) {
            cam.scrollX -= (p.x - p.prevPosition.x) / cam.zoom;
            cam.scrollY -= (p.y - p.prevPosition.y) / cam.zoom;
        }
    });
}

function changeZoom(amount) {
    if (cam) {
        cam.setZoom(Phaser.Math.Clamp(cam.zoom + amount, 0.2, 4));
    }
}
</script>

</body>
</html>
