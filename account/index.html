<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rucoy Nexus - Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: white;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #3cbcfe;
            max-width: 350px;
            width: 90%;
        }
        h1 { color: #3cbcfe; margin-bottom: 10px; font-size: 28px; }
        p { margin-bottom: 30px; color: #bbb; line-height: 1.5; }
        #buttonDiv { display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Rucoy Nexus</h1>
        <p>Bem-vindo! Faça login com sua conta Google para acessar o mapa e ferramentas.</p>
        
        <div id="buttonDiv"></div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            // Guarda o token no navegador
            localStorage.setItem("userToken", response.credential);
            // Manda para a Home
            window.location.href = "/";
        }

        window.onload = function () {
            google.accounts.id.initialize({
                // === COLOQUE SEU CLIENT ID ABAIXO ===
                client_id: "8160958088-tfs0b7l0h81osvt46qsjm55ildrp9itv.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { 
                    theme: "filled_blue", 
                    size: "large", 
                    text: "continue_with",
                    shape: "pill"
                }
            );
            
            google.accounts.id.prompt(); 
        }
    </script>
</body>
</html>
