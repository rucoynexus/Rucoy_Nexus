<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rucoy Nexus - Login</title>
    <style>
        body { margin: 0; background-color: #121212; color: white; font-family: 'Roboto', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-container { text-align: center; background: #1e1e1e; padding: 40px; border-radius: 10px; border: 1px solid #3cbcfe; width: 90%; max-width: 350px; }
        h1 { color: #3cbcfe; margin-bottom: 10px; }
        p { color: #bbb; margin-bottom: 30px; }
        .btn-google { background: #3cbcfe; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Rucoy Nexus</h1>
        <p>Faça login para continuar</p>
        <button class="btn-google" onclick="iniciarLogin()">ENTRAR COM GOOGLE</button>
    </div>

    <script>
        const CLIENT_ID = "8160958088-tfs0b7l0h81osvt46qsjm55ildrp9itv.apps.googleusercontent.com";
        // O link que você autorizou no console do Google
        const REDIRECT_URI = "https://rucoynexus.com/account/"; 

        function iniciarLogin() {
            const rootUrl = "https://accounts.google.com/o/oauth2/v2/auth";
            const options = {
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                response_type: "id_token",
                scope: "openid profile email",
                nonce: Math.random().toString(36).substring(2)
            };
            const qs = new URLSearchParams(options).toString();
            window.location.href = `${rootUrl}?${qs}`;
        }

        window.onload = function () {
            // Verifica se voltamos do Google com o token na URL
            const params = new URLSearchParams(window.location.hash.substring(1));
            const idToken = params.get("id_token");

            if (idToken) {
                localStorage.setItem("userToken", idToken);
                window.location.href = "/"; // Volta para a Home logado
            }
        }
    </script>
</body>
