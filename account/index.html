<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rucoy Nexus - Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body style="background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Roboto, sans-serif;">

    <div style="text-align: center; background: #1e1e1e; padding: 40px; border-radius: 10px; border: 1px solid #3cbcfe;">
        <h1 style="color: #3cbcfe;">Rucoy Nexus</h1>
        <p>Faça login para acessar</p>
        <div id="buttonDiv"></div>
    </div>

    <script>
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "8160958088-tfs0b7l0h81osvt46qsjm55ildrp9itv.apps.googleusercontent.com",
                ux_mode: 'redirect',
                // IMPORTANTE: Use a URL EXATA que está no seu Console do Google
                login_uri: "https://rucoynexus.com/" 
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "filled_blue", size: "large", shape: "pill" }
            );
        }
    </script>
</body>
</html>
