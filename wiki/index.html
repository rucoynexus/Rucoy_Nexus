<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rucoy Nexus</title>

<style>
:root {
  --rucoy-blue: #3CBCFC;
  --rucoy-bg: #121212;
  --rucoy-drawer-bg: #2173b3;
  --white: #F3F3F3;
}

body {
  background: var(--rucoy-bg);
  color: white;
  margin: 0;
}

/* ===== GRID ===== */
#lista {
  display: grid;
  grid-template-columns: repeat(5, 1fr); /* 5 por linha */
  gap: 12px;
}

/* CARD */
.item-card {
  position: relative;
  width: 100%;
  aspect-ratio: 1/1;
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SPRITE (IMPORTANTE) */
.item-sprite {
  width: 80%;
  height: 80%;
  background-image: url("./items.png"); /* SUA SPRITESHEET */
  background-repeat: no-repeat;
  image-rendering: pixelated;
}

/* NOME */
.item-name {
  position: absolute;
  bottom: 4px;
  width: 100%;
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  text-shadow: 1px 1px 3px #000;
}

/* drawer simplificado */
#drawer {
  position: fixed;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #2173b3;
  transition: 0.3s;
}
#drawer.active { left: 0; }

</style>
</head>

<body>

<button onclick="toggleMenu()">☰</button>

<div id="drawer">
  <p style="padding:10px;">Menu</p>
</div>

<input id="search" placeholder="Search..." style="width:100%;padding:10px;">
<select id="rarityFilter" style="width:100%;padding:10px;">
<option value="">All</option>
<option value="commun">Commun</option>
<option value="rare">Rare</option>
<option value="mythic">Mythic</option>
</select>

<div id="lista"></div>

<script>
function toggleMenu(){
  document.getElementById("drawer").classList.toggle("active");
}

/* =========================
   CONFIG
========================= */
let items = {};
let sprites = {};

let listaFiltrada = [];
let pagina = 0;
const POR_PAGINA = 50;

/* =========================
   BACKGROUND POR RARIDADE
========================= */
function getBackground(r){
  r = (r||"").toLowerCase();

  if(r==="rare") return "rare-background.png";
  if(r==="mythic") return "mythic-background.png";

  return "commun-background.png";
}

/* =========================
   NORMALIZA NOME (pra bater com sprite)
========================= */
function normalizar(nome){
  return nome
    .toLowerCase()
    .replace(/'/g,"")
    .replace(/\(.*?\)/g,"")
    .replace(/[^a-z0-9 ]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

/* =========================
   CRIAR ITEM
========================= */
function criarItemHTML(nome,item){

  let raridade = item["Rarity: "] || item.rarity || "";
  let bg = getBackground(raridade);

  let nomeNormal = normalizar(nome);

  let frame = null;

  // procura no json da spritesheet
  for(let key in sprites){
    let k = key.replace(".png","");

    if(normalizar(k) === nomeNormal){
      frame = sprites[key].frame;
      break;
    }
  }

  let styleSprite = "";

  if(frame){
    styleSprite = `
      background-position: -${frame.x}px -${frame.y}px;
      width:${frame.w}px;
      height:${frame.h}px;
    `;
  }

  return `
  <div class="item-card" style="background-image:url('${bg}')">

    <div class="item-sprite" style="${styleSprite}"></div>

    <div class="item-name">${nome}</div>

  </div>
  `;
}

/* =========================
   FILTRO
========================= */
function aplicarFiltro(){

  let busca = document.getElementById("search").value.toLowerCase();
  let raridadeFiltro = document.getElementById("rarityFilter").value;

  listaFiltrada = [];

  for(let id in items){
    let item = items[id];

    let nome = item["Name: "] || item.name || "???";
    let tags = (item["Tags"]||"").toLowerCase();
    let raridade = (item["Rarity: "]||item.rarity||"").toLowerCase();

    if(raridadeFiltro && raridade!==raridadeFiltro) continue;

    if(nome.toLowerCase().includes(busca) || tags.includes(busca)){
      listaFiltrada.push({nome,item});
    }
  }

  pagina=0;
  document.getElementById("lista").innerHTML="";
  carregarMais();
}

/* =========================
   PAGINAÇÃO INFINITA
========================= */
function carregarMais(){

  let lista = document.getElementById("lista");

  let inicio = pagina * POR_PAGINA;
  let fim = inicio + POR_PAGINA;

  let slice = listaFiltrada.slice(inicio,fim);

  slice.forEach(e=>{
    lista.innerHTML += criarItemHTML(e.nome,e.item);
  });

  pagina++;
}

/* SCROLL INFINITO */
window.addEventListener("scroll",()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
    carregarMais();
  }
});

/* =========================
   LOAD JSON
========================= */
async function carregar(){

  let res1 = await fetch("./items.json");
  items = await res1.json();

  let res2 = await fetch("./items_png.json");
  let data = await res2.json();
  sprites = data.frames;

  aplicarFiltro();
}

document.getElementById("search").addEventListener("input",aplicarFiltro);
document.getElementById("rarityFilter").addEventListener("change",aplicarFiltro);

carregar();
</script>

</body>
</html>
