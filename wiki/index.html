<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/icon.jpeg">
    <title>Rucoy Nexus - Wiki</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div id="item-details">
    <div style="width: 100%; margin-top: 20px;">
        <canvas id="graficoPreco"></canvas>
    </div>
</div>
    <script src="/auth.js"></script>
</head>
<body>
    <div id="details-overlay">
        <button class="btn-close" onclick="fecharDetalhes()">&times;</button>
        <div id="details-content" style="display: flex; flex-direction: column; align-items: center; width: 100%;"></div>
    </div>
    
    <div id="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="top-bar-action" onclick="toggleMenu()">
            <div class="menu-btn"><img src="/res/icon/navnav.png"></div>
            <span id="current-page-title">Wiki</span>
        </div>
    </header>

    <nav id="drawer">
        <div class="drawer-banner"></div>
        <div class="drawer-list">
            <a href="/" class="drawer-item"><img src="/res/icon/home.png"> Home</a>
            <a href="/profile/" class="drawer-item"><img src="/res/icon/user.png"> Profile</a>
            <a href="/wiki/" class="drawer-item"><img src="/res/icon/apps.png"> Wiki</a>
            <a href="/tradeandsales/" class="drawer-item"><img src="/res/icon/change.png"> Trades & Sales</a>
            <a href="/map/" class="drawer-item"><img src="/res/icon/map.png"> Map</a>
            <a href="/players/" class="drawer-item"><img src="/res/icon/players.png"> Players</a>
            <a href="/guild/" class="drawer-item"><img src="/res/icon/guild.png"> Guild</a>
            <a href="/calculator/" class="drawer-item"><img src="/res/icon/calculator.png"> Calculator</a>
            <a href="/updates/" class="drawer-item"><img src="/res/icon/update.png"> Updates</a>
            <a href="/settings/" class="drawer-item settings-highlight"><img src="/res/icon/ic_cog.png"> Settings</a>
        </div>
    </nav>

    <main id="main-content">
        <input type="text" id="search" placeholder="Search items...">
        
        <select id="rarityFilter">
            <option value="">All rarities</option>
            <option value="commun">Commun</option>
            <option value="uncommun">Uncommun</option>
            <option value="rare">Rare</option>
            <option value="ultra rare">Ultra Rare</option>
            <option value="legendary">Legendary</option>
            <option value="mythic">Mythic</option>
        </select>

        <div id="lista"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
