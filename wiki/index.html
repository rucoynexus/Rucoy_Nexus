<!DOCTYPE html>
<html lang="en">
<head>
<script src="/auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rucoy Nexus</title>

<style>
:root {
    --rucoy-blue: #3CBCFC;
    --rucoy-bg: #121212;
    --rucoy-drawer-bg: #2173b3;
    --white: #F3F3F3;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
body { background:var(--rucoy-bg); color:var(--white); }

/* ===== TOP BAR ===== */
header {
    background-color: var(--rucoy-blue);
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
}

.top-bar-action {
    display: flex;
    align-items: center;
    cursor: pointer;
}

.menu-btn img {
    width: 24px;
    filter: brightness(0) invert(1);
    margin-right: 15px;
}

/* ===== DRAWER ===== */
#drawer {
    position: fixed;
    top: 0;
    left: -280px;
    width: 280px;
    height: 100%;
    background-color: var(--rucoy-drawer-bg);
    z-index: 200;
    transition: 0.3s;
}

#drawer.active { left: 0; }

.drawer-list a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
}

.drawer-list a:hover {
    background: rgba(255,255,255,0.1);
}

/* overlay */
#overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    z-index:150;
}

/* ===== CONTEÚDO ===== */
main {
    padding: 70px 10px 10px 10px;
}

/* ===== GRID ===== */
#lista {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 10px;
}

.item-card {
  position: relative;
  aspect-ratio: 1/1;
  background-size: cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sprite {
  image-rendering: pixelated;
  background-repeat: no-repeat;
  transform: scale(2);
}

.item-name {
  position:absolute;
  bottom:2px;
  width:100%;
  text-align:center;
  font-size:12px;
  font-weight:bold;
  text-shadow:1px 1px 2px #000;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<header>
  <div class="top-bar-action" onclick="toggleMenu()">
    <div class="menu-btn">
      <img src="/res/icon/navnav.png">
    </div>
    <span>Wiki</span>
  </div>
</header>

<!-- DRAWER -->
<nav id="drawer">
  <div class="drawer-list">
    <a href="/">Home</a>
    <a href="/profile/">Profile</a>
    <a href="/wiki/">Wiki</a>
    <a href="/tradeandsales/">Trades</a>
    <a href="/map/">Map</a>
    <a href="/players/">Players</a>
    <a href="/guild/">Guild</a>
    <a href="/calculator/">Calculator</a>
    <a href="/updates/">Updates</a>
    <a href="/settings/">Settings</a>
  </div>
</nav>

<main>

<input id="search" placeholder="Search..." style="width:100%;padding:10px;margin-bottom:10px;">

<select id="rarityFilter" style="width:100%;padding:10px;margin-bottom:10px;">
<option value="">All</option>
<option value="commun">Commun</option>
<option value="uncommun">Uncommun</option>
<option value="rare">Rare</option>
<option value="ultra rare">Ultra Rare</option>
<option value="legendary">Legendary</option>
<option value="mythic">Mythic</option>
</select>

<div id="lista"></div>

<button onclick="carregarMais()" id="loadMore">Load more</button>

</main>

<script>

// ===== MENU =====
function toggleMenu() {
  const drawer = document.getElementById("drawer");
  const overlay = document.getElementById("overlay");

  drawer.classList.toggle("active");
  overlay.style.display = drawer.classList.contains("active") ? "block" : "none";
}

// ============================
// RESTO DO SEU SCRIPT (INALTERADO)
// ============================

let items = {};
let sprites = {};
let listaFiltrada = [];

let pagina = 0;
const POR_PAGINA = 50;

function getBackground(r) {
  r = (r || "").toLowerCase();

  if (r === "commun") return "commun-background.png";
  if (r === "uncommun") return "uncommun-background.png";
  if (r === "rare") return "rare-background.png";
  if (r === "ultra rare") return "ultra-rare-background.png";
  if (r === "legendary") return "legendary-background.png";
  if (r === "mythic") return "mythic-background.png";

  return "commun-background.png";
}

function normalizar(nome) {
  return nome.toLowerCase().replace(/'/g,"").replace(/\(.*?\)/g,"").replace(/[^a-z0-9 ]/g,"").trim();
}

function acharSprite(nome) {
  let n = normalizar(nome);

  for (let key in sprites) {
    let k = normalizar(key.replace(".png", ""));
    if (k === n) return sprites[key];
  }
  return null;
}

function criarItemHTML(nome, item) {

  let raridade = item["Rarity: "] || item.rarity || "";
  let bg = getBackground(raridade);

  let sprite = acharSprite(nome);

  let spriteHTML = "";

  if (sprite) {
    let f = sprite.frame;

    spriteHTML = `
      <div class="sprite"
        style="
          width:${f.w}px;
          height:${f.h}px;
          background-image:url('./items.png');
          background-position:-${f.x}px -${f.y}px;
        ">
      </div>
    `;
  }

  return `
    <div class="item-card" style="background-image:url('${bg}')">
      ${spriteHTML}
      <div class="item-name">${nome}</div>
    </div>
  `;
}

function aplicarFiltro() {

  let busca = document.getElementById("search").value.toLowerCase();
  let raridadeFiltro = document.getElementById("rarityFilter").value;

  listaFiltrada = [];

  for (let id in items) {

    let item = items[id];
    let nome = item["Name: "] || item.name || "???";
    let tags = (item["Tags"] || "").toLowerCase();
    let raridade = (item["Rarity: "] || item.rarity || "").toLowerCase();

    if (raridadeFiltro && raridade !== raridadeFiltro) continue;

    if (
      nome.toLowerCase().includes(busca) ||
      tags.includes(busca)
    ) {
      listaFiltrada.push({ nome, item });
    }
  }

  pagina = 0;
  document.getElementById("lista").innerHTML = "";

  carregarMais();
}

function carregarMais() {

  let lista = document.getElementById("lista");

  let inicio = pagina * POR_PAGINA;
  let fim = inicio + POR_PAGINA;

  let slice = listaFiltrada.slice(inicio, fim);

  slice.forEach(e => {
    lista.innerHTML += criarItemHTML(e.nome, e.item);
  });

  pagina++;

  let btn = document.getElementById("loadMore");

  if (fim >= listaFiltrada.length) {
    btn.style.display = "none";
  } else {
    btn.style.display = "block";
  }
}

async function carregar() {

  let res1 = await fetch("./items.json");
  items = await res1.json();

  let res2 = await fetch("./items_png.json");
  let data = await res2.json();
  sprites = data.frames;

  aplicarFiltro();
}

document.getElementById("search").addEventListener("input", aplicarFiltro);
document.getElementById("rarityFilter").addEventListener("change", aplicarFiltro);

carregar();

</script>
</body>
</html>
