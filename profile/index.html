<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="/icon.jpeg">
    <title>Rucoy Nexus - Profile</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="top-bar-action" onclick="toggleMenu()">
            <div class="menu-btn"><img src="/res/icon/navnav.png" alt="menu"></div>
            <span id="current-page-title">Profile</span>
        </div>
    </header>

    <nav id="drawer">
        <div class="drawer-banner"></div>
        <div class="drawer-list">
            <a href="/" class="drawer-item"><img src="/res/icon/home.png"> Home</a>
            <a href="/profile/" class="drawer-item"><img src="/res/icon/user.png"> Profile</a>
            <a href="/wiki/" class="drawer-item"><img src="/res/icon/apps.png"> Wiki</a>
            <a href="/tradeandsales/" class="drawer-item"><img src="/res/icon/change.png"> Trades & Sales</a>
            <a href="/map/" class="drawer-item"><img src="/res/icon/map.png"> Map</a>
            <a href="/players/" class="drawer-item"><img src="/res/icon/players.png"> Players</a>
            <a href="/guild/" class="drawer-item"><img src="/res/icon/guild.png"> Guild</a>
            <a href="/calculator/" class="drawer-item"><img src="/res/icon/calculator.png"> Calculator</a>
            <a href="/updates/" class="drawer-item"><img src="/res/icon/update.png"> Updates</a>
            <a href="/settings/" class="drawer-item settings-highlight"><img src="/res/icon/ic_cog.png"> Settings</a>
        </div>
    </nav>

    <main>
        <div id="welcome-msg">
            <h1 style="font-size: 24px; color: var(--rucoy-blue);">My Characters</h1>
            <p style="color: #888; font-size: 14px;">Manage your Rucoy Online profiles.</p>
        </div>

        <div id="charList" class="char-list">
            <p id="no-chars" style="text-align: center; margin: 40px 0; color: #555;">No characters found.</p>
        </div>

        <div class="add-char-container">
            <button id="btnAddChar" class="btn-add" onclick="openModal()">+ ADD CHARACTER</button>
            <p id="limit-msg" style="font-size: 11px; color: #666; margin-top: 10px;">Limit: 0/10 characters</p>
        </div>
    </main>

    <div id="modal-char">
        <div class="modal-content">
            <h2>New Character</h2>
            <div class="form-group">
                <label>CHARACTER NAME</label>
                <input type="text" id="inputName" placeholder="Ex: Brutal Bestiall" maxlength="15">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>LEVEL</label>
                    <input type="number" id="inputLv" placeholder="0">
                </div>
                <div class="form-group">
                    <label>DEFENSE</label>
                    <input type="number" id="inputDef" placeholder="0">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>MELEE</label>
                    <input type="number" id="inputMelee" placeholder="0">
                </div>
                <div class="form-group">
                    <label>DISTANCE</label>
                    <input type="number" id="inputDist" placeholder="0">
                </div>
                <div class="form-group">
                    <label>MAGIC</label>
                    <input type="number" id="inputMag" placeholder="0">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button class="btn-save" onclick="salvarPersonagem()">SAVE PROFILE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
