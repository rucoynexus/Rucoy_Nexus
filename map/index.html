<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/jpeg" href="/icon.jpeg">
    <title>Rucoy Nexus - Map</title>
    <style>
        :root {
            --rucoy-blue: #3CBCFC;
            --rucoy-bg: #121212;
            --rucoy-drawer-bg: #2173b3;
            --white: #F3F3F3;
        }

        html, body {
            margin: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Roboto', sans-serif; cursor: default;
        }

        canvas {
            display: block; background: #000;
            image-rendering: pixelated; touch-action: none;
        }

        /* --- UI ELEMENTS --- */
        #coords {
            position: absolute; top: 66px; left: 10px;
            background: rgba(0, 0, 0, 0.7); color: #0f0;
            border: 1px solid #0f0; padding: 8px;
            z-index: 10; font-family: monospace; pointer-events: none;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); color: #0f0;
            font-size: 18px; pointer-events: none; z-index: 5;
        }

        /* --- HEADER & MENU LATERAL --- */
        header {
            background-color: var(--rucoy-blue);
            height: 56px; display: flex; align-items: center;
            padding: 0 16px; position: fixed; top: 0;
            width: 100%; z-index: 100;
        }

        .top-bar-action {
            display: flex; align-items: center; height: 100%;
            padding-right: 30px; cursor: pointer;
        }

        .menu-btn img { width: 24px; filter: brightness(0) invert(1); margin-right: 20px; }
        #current-page-title { font-size: 20px; font-weight: 500; color: white; }

        #drawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: var(--rucoy-drawer-bg); z-index: 200;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;
        }
        #drawer.active { left: 0; }
        
        .drawer-banner { 
            width: 100%; height: 150px; 
            background: url('/res/icon/draweBanner.png') no-repeat center; 
            background-size: cover; 
        }

        .drawer-item { 
            padding: 12px 16px; display: flex; align-items: center; 
            color: white; text-decoration: none; font-size: 16px; 
        }
        .drawer-item img { width: 24px; height: 24px; margin-right: 32px; filter: brightness(0) invert(1); }
        
        .settings-highlight {
            margin-top: 20px; 
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #000000 !important; font-weight: bold;
        }
        .settings-highlight img { filter: brightness(0) !important; }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; z-index: 150; 
        }

        /* App Mode */
        body.is-app header, body.is-app #drawer, body.is-app #overlay { display: none !important; }
        body.is-app #coords { top: 10px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="top-bar-action" onclick="toggleMenu()">
            <div class="menu-btn"><img src="/res/icon/navnav.png" alt="menu"></div>
            <span id="current-page-title">Map Viewer</span>
        </div>
    </header>

    <nav id="drawer">
        <div class="drawer-banner"></div>
        <div class="drawer-list">
            <a href="/" class="drawer-item"><img src="/res/icon/home.png"> Home</a>
            <a href="/profile/" class="drawer-item"><img src="/res/icon/user.png"> Profile</a>
            <a href="/wiki/" class="drawer-item"><img src="/res/icon/apps.png"> Wiki</a>
            <a href="/tradeandsales/" class="drawer-item"><img src="/res/icon/change.png"> Trades & Sales</a>
            <a href="/map/" class="drawer-item"><img src="/res/icon/map.png"> Map</a>
           <a href="/players/" class="drawer-item"><img src="/res/icon/players.png"> Players</a>
            <a href="/guild/" class="drawer-item"><img src="/res/icon/guild.png"> Guild</a>
            <a href="/calculator/" class="drawer-item"><img src="/res/icon/calculator.png"> Calculator</a>
            <a href="/updates/" class="drawer-item"><img src="/res/icon/update.png"> Updates</a>
            <a href="/settings/" class="drawer-item settings-highlight"><img src="/res/icon/ic_cog.png"> Settings</a>
        </div>
    </nav>

    <div id="coords">Carregando...</div>
    <div id="crosshair">+</div>
    <canvas id="mapCanvas"></canvas>

<script>
/* ================= VERIFICAÇÃO DE PLATAFORMA ================= */
const params = new URLSearchParams(window.location.search);
const isAppMode = params.get('platform') === 'app';
if (isAppMode) document.body.classList.add('is-app');

/* ================= MENU ================= */
function toggleMenu() {
    const d = document.getElementById('drawer'), o = document.getElementById('overlay');
    d.classList.toggle('active');
    o.style.display = d.classList.contains('active') ? 'block' : 'none';
}

/* ================= MOTOR DO MAPA ================= */
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const coordsDisplay = document.getElementById('coords');

const TILE_W = 24, TILE_H = 24;
const MARGIN = 1, STEP = 26;
const MAP_OFFSET_X = 27;
const MAP_OFFSET_Y = 11;
const CHUNK_SIZE = 16; 

let mapData = null;
let tilesetImg = new Image();
let camera = { x: 0, y: 0, scale: 2.5 };
let animLookup = new Map();
let chunkCache = new Map(); 
let mapReady = false;

function initMap(json) {
    mapData = json;
    const ts = mapData.tilesets[0];
    if (ts.tiles) {
        ts.tiles.forEach(t => { if (t.animation) animLookup.set(t.id, t.animation); });
    }
    tilesetImg.src = "map.png";
    tilesetImg.onload = () => {
        resize();
        camera.x = -((130 - MAP_OFFSET_X) * TILE_W);
        camera.y = -((281 - MAP_OFFSET_Y) * TILE_H);
        mapReady = true;
        renderLoop();
    };
}

fetch("defalt_world.json").then(r => r.json()).then(initMap);

function getCachedChunk(layerIdx, cx, cy, frameIdx) {
    const key = `${layerIdx}_${cx}_${cy}_f${frameIdx}`;
    if (chunkCache.has(key)) return chunkCache.get(key);

    const offX = cx * CHUNK_SIZE;
    const offY = cy * CHUNK_SIZE;
    const layer = mapData.layers[layerIdx];
    const ts = mapData.tilesets[0];
    const cols = ts.columns;

    const offCanvas = document.createElement('canvas');
    offCanvas.width = CHUNK_SIZE * TILE_W;
    offCanvas.height = CHUNK_SIZE * TILE_H;
    const offCtx = offCanvas.getContext('2d');

    for (let y = 0; y < CHUNK_SIZE; y++) {
        for (let x = 0; x < CHUNK_SIZE; x++) {
            const mapX = offX + x;
            const mapY = offY + y;
            if (mapX >= layer.width || mapY >= layer.height) continue;
            let gid = layer.data[mapY * layer.width + mapX];
            if (!gid || gid === 0) continue;
            let tileId = gid - ts.firstgid;
            if (animLookup.has(tileId)) {
                const anim = animLookup.get(tileId);
                tileId = anim[frameIdx]?.tileid ?? anim[0].tileid;
            }
            const sx = MARGIN + (tileId % cols) * STEP;
            const sy = MARGIN + Math.floor(tileId / cols) * STEP;
            offCtx.drawImage(tilesetImg, sx, sy, TILE_W, TILE_H, x * TILE_W, y * TILE_H, TILE_W, TILE_H);
        }
    }
    chunkCache.set(key, offCanvas);
    return offCanvas;
}

function renderLoop() {
    if (!mapReady) return;
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.imageSmoothingEnabled = false;

    const time = performance.now();
    const frameIdx = (camera.scale >= 0.5) ? (Math.floor(time / 900) % 2) : 0;

    const startChunkX = Math.floor((-camera.x - (canvas.width/2)/camera.scale) / (CHUNK_SIZE * TILE_W));
    const endChunkX = Math.ceil((-camera.x + (canvas.width/2)/camera.scale) / (CHUNK_SIZE * TILE_W));
    const startChunkY = Math.floor((-camera.y - (canvas.height/2)/camera.scale) / (CHUNK_SIZE * TILE_H));
    const endChunkY = Math.ceil((-camera.y + (canvas.height/2)/camera.scale) / (CHUNK_SIZE * TILE_H));

    mapData.layers.forEach((layer, lIdx) => {
        if (!layer.visible) return;
        for (let cy = startChunkY; cy <= endChunkY; cy++) {
            for (let cx = startChunkX; cx <= endChunkX; cx++) {
                if (cx < 0 || cy < 0 || cx >= Math.ceil(layer.width/CHUNK_SIZE) || cy >= Math.ceil(layer.height/CHUNK_SIZE)) continue;
                const chunkImg = getCachedChunk(lIdx, cx, cy, frameIdx);
                const rx = (cx * CHUNK_SIZE * TILE_W + camera.x) * camera.scale + canvas.width / 2;
                const ry = (cy * CHUNK_SIZE * TILE_H + camera.y) * camera.scale + canvas.height / 2;
                ctx.drawImage(chunkImg, Math.round(rx), Math.round(ry), Math.ceil(chunkImg.width * camera.scale), Math.ceil(chunkImg.height * camera.scale));
            }
        }
    });

    const tileX = Math.floor((-camera.x) / TILE_W) + MAP_OFFSET_X;
    const tileY = Math.floor((-camera.y) / TILE_H) + MAP_OFFSET_Y;
    coordsDisplay.textContent = `X: ${tileX}, Y: ${tileY} | Zoom: ${camera.scale.toFixed(2)}x`;
    requestAnimationFrame(renderLoop);
}

/* ================= CONTROLES COM TRAVA DE ZOOM ================= */
function applyZoom(m, centerX, centerY) {
    const oldScale = camera.scale;
    
    // Se for Modo App, o limite mínimo é 0.30. Se for PC/Web, deixamos chegar a 0.05.
    const minZoomLimit = isAppMode ? 0.30 : 0.05;
    
    camera.scale = Math.min(Math.max(camera.scale * m, minZoomLimit), 10);
    
    const ratio = camera.scale / oldScale;
    camera.x = centerX / camera.scale - (centerX / oldScale - camera.x);
    camera.y = centerY / camera.scale - (centerY / oldScale - camera.y);
}

// Mouse Wheel
canvas.addEventListener("wheel", e => {
    e.preventDefault();
    applyZoom(e.deltaY < 0 ? 1.15 : 0.85, e.clientX - canvas.width/2, e.clientY - canvas.height/2);
}, { passive: false });

// Mouse Drag
let isDragging = false, lastX, lastY;
canvas.addEventListener("mousedown", e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener("mousemove", e => {
    if (!isDragging) return;
    camera.x += (e.clientX - lastX) / camera.scale;
    camera.y += (e.clientY - lastY) / camera.scale;
    lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener("mouseup", () => isDragging = false);

// Touch & Pinch (Celular)
let lastDist = 0;
canvas.addEventListener("touchstart", e => {
    if (e.touches.length === 1) {
        isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
        isDragging = false;
        lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
}, { passive: false });

canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
        camera.x += (e.touches[0].clientX - lastX) / camera.scale;
        camera.y += (e.touches[0].clientY - lastY) / camera.scale;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - canvas.width/2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - canvas.height/2;
        applyZoom(dist / lastDist, midX, midY);
        lastDist = dist;
    }
}, { passive: false });

canvas.addEventListener("touchend", () => { isDragging = false; lastDist = 0; });

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);
resize();
</script>
</body>
</html>
