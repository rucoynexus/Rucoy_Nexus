<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rucoy Nexus - Map</title>
    <style>
        :root {
            --rucoy-blue: #3CBCFC;
            --rucoy-bg: #121212;
            --rucoy-drawer-bg: #2173b3;
            --white: #F3F3F3;
        }
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; background: #000; image-rendering: pixelated; touch-action: none; }
        #coords { position: absolute; top: 66px; left: 10px; background: rgba(0, 0, 0, 0.7); color: #0f0; border: 1px solid #0f0; padding: 8px; z-index: 10; font-family: monospace; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #0f0; font-size: 18px; pointer-events: none; z-index: 5; }
        .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .zoom-btn { width: 50px; height: 50px; border-radius: 25px; background: rgba(0, 255, 0, 0.2); border: 2px solid #0f0; color: #0f0; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        header { background-color: var(--rucoy-blue); height: 56px; display: flex; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 100; }
        .top-bar-action { display: flex; align-items: center; height: 100%; cursor: pointer; }
        .menu-btn img { width: 24px; filter: brightness(0) invert(1); margin-right: 20px; }
        #current-page-title { font-size: 20px; font-weight: 500; color: white; }
        #drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: var(--rucoy-drawer-bg); z-index: 200; transition: 0.3s; overflow-y: auto; }
        #drawer.active { left: 0; }
        .drawer-item { padding: 12px 16px; display: flex; align-items: center; color: white; text-decoration: none; }
        .drawer-item img { width: 24px; margin-right: 32px; filter: brightness(0) invert(1); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        body.is-app header, body.is-app #drawer, body.is-app #overlay { display: none !important; }
        body.is-app #coords { top: 10px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>
    <header>
        <div class="top-bar-action" onclick="toggleMenu()">
            <div class="menu-btn"><img src="/res/icon/navnav.png" alt="menu"></div>
            <span id="current-page-title">Map Viewer</span>
        </div>
    </header>

    <nav id="drawer">
        <div style="height:150px; background: #1a5a8d;"></div>
        <a href="/" class="drawer-item"><img src="/res/icon/home.png"> Home</a>
        <a href="/map/" class="drawer-item"><img src="/res/icon/map.png"> Map</a>
    </nav>

    <div id="coords">Carregando...</div>
    <div id="crosshair">+</div>
    <div class="zoom-controls">
        <div class="zoom-btn" onclick="applyZoom(1.2)">+</div>
        <div class="zoom-btn" onclick="applyZoom(0.8)">-</div>
    </div>

    <canvas id="mapCanvas"></canvas>

<script>
function toggleMenu() {
    const d = document.getElementById('drawer'), o = document.getElementById('overlay');
    d.classList.toggle('active');
    o.style.display = d.classList.contains('active') ? 'block' : 'none';
}

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const coordsDisplay = document.getElementById('coords');

const TILE_W = 24, TILE_H = 24;
const MARGIN = 1, STEP = 26;
const MAP_OFFSET_X = 27;
const MAP_OFFSET_Y = 11;

let mapData = null;
let tilesetImg = new Image();
let camera = { x: 0, y: 0, scale: 2.5 };
let animLookup = new Map();
let mapReady = false;

function initMap(jsonString) {
    try {
        mapData = (typeof jsonString === 'string') ? JSON.parse(jsonString) : jsonString;
        const ts = mapData.tilesets[0];
        if (ts.tiles) {
            ts.tiles.forEach(t => { if (t.animation) animLookup.set(t.id, t.animation); });
        }
        tilesetImg.src = "map.png";
        tilesetImg.onload = () => {
            resize();
            // Focar na cidade (130, 281)
            camera.x = -((130 - MAP_OFFSET_X) * TILE_W);
            camera.y = -((281 - MAP_OFFSET_Y) * TILE_H);
            mapReady = true;
            requestAnimationFrame(renderLoop);
        };
    } catch (e) { coordsDisplay.textContent = "Erro no JSON"; }
}

fetch("defalt_world.json").then(r => r.json()).then(initMap);

function renderLoop() {
    if (!mapReady) return;
    
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.imageSmoothingEnabled = false;

    const time = performance.now();
    const animFrame = Math.floor(time / 900) % 2;
    const ts = mapData.tilesets[0];
    const cols = ts.columns;

    // Calcular área visível para não processar o que está fora da tela (Culling)
    const viewW = canvas.width / camera.scale;
    const viewH = canvas.height / camera.scale;
    const minX = -camera.x - viewW/2;
    const maxX = -camera.x + viewW/2;
    const minY = -camera.y - viewH/2;
    const maxY = -camera.y + viewH/2;

    mapData.layers.forEach(layer => {
        if (!layer.visible && layer.opacity === 0) return;
        
        let data = layer.data;
        let layerW = layer.width;
        let layerH = layer.height;
        let startX = 0, startY = 0;

        if (layer.chunks) {
            // Se ainda houver chunks, processamos cada um de forma leve
            layer.chunks.forEach(chunk => {
                drawTileArray(chunk.data, chunk.width, chunk.height, chunk.x, chunk.y, ts, cols, animFrame);
            });
        } else if (data) {
            drawTileArray(data, layerW, layerH, 0, 0, ts, cols, animFrame);
        }
    });

    function drawTileArray(tiles, w, h, offX, offY, ts, cols, frameIdx) {
        for (let i = 0; i < tiles.length; i++) {
            const gid = tiles[i];
            if (gid === 0) continue;

            const tx = (i % w + offX) * TILE_W;
            const ty = (Math.floor(i / w) + offY) * TILE_H;

            // Só desenha se estiver na tela
            if (tx + TILE_W < minX || tx > maxX || ty + TILE_H < minY || ty > maxY) continue;

            let tileId = gid - ts.firstgid;
            if (animLookup.has(tileId)) {
                const anim = animLookup.get(tileId);
                tileId = anim[frameIdx]?.tileid ?? anim[0].tileid;
            }

            const sx = MARGIN + (tileId % cols) * STEP;
            const sy = MARGIN + Math.floor(tileId / cols) * STEP;

            const screenX = (tx + camera.x) * camera.scale + canvas.width / 2;
            const screenY = (ty + camera.y) * camera.scale + canvas.height / 2;

            ctx.drawImage(tilesetImg, sx, sy, TILE_W, TILE_H, 
                          Math.round(screenX), Math.round(screenY), 
                          Math.ceil(TILE_W * camera.scale), Math.ceil(TILE_H * camera.scale));
        }
    }

    const tileX = Math.floor((-camera.x) / TILE_W) + MAP_OFFSET_X;
    const tileY = Math.floor((-camera.y) / TILE_H) + MAP_OFFSET_Y;
    coordsDisplay.textContent = `X: ${tileX}, Y: ${tileY} | Zoom: ${camera.scale.toFixed(1)}x`;
    
    requestAnimationFrame(renderLoop);
}

function applyZoom(m) { camera.scale = Math.min(Math.max(camera.scale * m, 0.1), 10); }
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);

// Eventos de arrastar
let isDragging = false, lastX, lastY;
canvas.addEventListener("mousedown", e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener("mousemove", e => {
    if (!isDragging) return;
    camera.x += (e.clientX - lastX) / camera.scale;
    camera.y += (e.clientY - lastY) / camera.scale;
    lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener("mouseup", () => isDragging = false);

// Touch simplificado para celular
canvas.addEventListener("touchstart", e => {
    if(e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }
}, {passive: false});
canvas.addEventListener("touchmove", e => {
    if(isDragging && e.touches.length === 1) {
        camera.x += (e.touches[0].clientX - lastX) / camera.scale;
        camera.y += (e.touches[0].clientY - lastY) / camera.scale;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }
}, {passive: false});
canvas.addEventListener("touchend", () => isDragging = false);

resize();
</script>
</body>
</html>
